[tool:pytest]
minversion = 7.0
addopts = -ra -q --strict-markers
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage options
# addopts = --cov=app --cov-report=html --cov-report=term-missing

markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    api: API tests
    service: Service layer tests
